[general]
vault_path = "/path/to/your/obsidian/vault"
output_dir = "daily-research"
language = "ja"
date_format = "%Y-%m-%d"

[report]
min_sources = 5

# Each track maps to one research repository.
# At startup the repo's graph.jsonld is synced into .repo-graphs/<track>.jsonld,
# and Pass 1 reads it together with the coverage-report to pick external research
# that reinforces concepts not yet covered. No fixed `domains`: the area of interest
# is derived dynamically from the repo graph. Define one track per repo you want fed.

[tracks.repo_a]
name = "Research Repo A Contribution"
focus = "Discover external research that reinforces and extends the concept system of research repo A"
target_repo = "/path/to/your/research-repo-a"
target_graph = ".repo-graphs/repo_a.jsonld"   # cwd-relative path after sync
target_doi = "10.xxxx/zenodo.xxxxxxxx"          # optional; the repo's DOI if it has one
sources = [
  "Semantic Scholar (your repo's domain keywords)",
  "arXiv (relevant categories for the repo)",
]
scoring_criteria = [
  { name = "Concept reinforcement", weight = 35, desc = "Reinforces an uncovered / thinly-supported concept (see coverage-report)" },
  { name = "Research recency", weight = 25, desc = "Latest 2026 research or development" },
  { name = "Repo frontier fit", weight = 25, desc = "Serves the repo's next direction / open questions" },
  { name = "Buildability", weight = 15, desc = "Leads to implementation in Python/Swift/TypeScript" },
]

